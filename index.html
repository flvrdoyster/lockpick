<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interactive Lockpicking</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #ffd700;
            --danger-color: #ff3b30;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            cursor: default;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Start Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 2rem;
            max-width: 300px;
            line-height: 1.5;
        }

        #start-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: white;
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* Lock Container */
        .game-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-outer {
            position: relative;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 30% 30%, #333, #111);
            border-radius: 50%;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 2px 10px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #222;
        }

        .lock-cylinder {
            position: relative;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 30% 30%, #444, #222);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.1), 0 5px 15px rgba(0, 0, 0, 0.5);
            /* GPU Acceleration */
            will-change: transform;
            transform: translateZ(0);
        }

        .keyhole {
            width: 12px;
            height: 50px;
            background: #000;
            border-radius: 4px;
            position: relative;
        }

        .keyhole::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 50%;
        }

        .indicator {
            position: absolute;
            top: -20px;
            width: 4px;
            height: 20px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            border-radius: 2px;
        }


        /* Status Bar */
        .status-bar {
            position: fixed;
            top: 40px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            display: flex;
            gap: 20px;
        }

        .status-item span {
            color: #aaa;
        }

        /* Animation when unlocked */
        .unlocked .lock-cylinder {
            animation: shake 0.5s ease-in-out;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
        }

        @keyframes shake {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.1) rotate(5deg);
            }

            50% {
                transform: scale(1.05) rotate(-5deg);
            }

            75% {
                transform: scale(1.1) rotate(5deg);
            }
        }

        .hint {
            position: fixed;
            bottom: 40px;
            font-size: 0.9rem;
            color: #444;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>LOCKPICK</h1>
        <p>
            <strong>스마트폰을 책상 위에 내려놓으세요.</strong><br>
            화면을 <strong>가볍게 터치한 채로</strong> 폰을 회전시켜 정답 각도를 찾으십시오.<br>
            손 끝에 전해지는 미세한 진동에 집중하세요!
        </p>
        <button id="start-btn">시작</button>
    </div>

    <div class="status-bar">
        <div class="status-item">STATUS: <span id="status-text">LOCKED</span></div>
        <div class="status-item">STAGE: <span id="stage-text">1/3</span></div>
        <div class="status-item">ANGLE: <span id="angle-text">0°</span></div>
    </div>

    <div class="game-container" id="game-container">
        <div class="lock-outer" id="lock-outer">
            <div class="lock-cylinder" id="cylinder">
                <div class="indicator"></div>
                <div class="keyhole"></div>
            </div>
        </div>
    </div>


    <div class="hint">TOUCH & HOLD TO FEEL TENSION • TAP TO UNLOCK</div>

    <!-- Hidden haptic trigger for iOS 17.4+ -->
    <div
        style="position: fixed; top: 0; left: 0; width: 0; height: 0; opacity: 0; overflow: hidden; pointer-events: none; z-index: -1;">
        <input type="checkbox" id="haptic-trigger" switch tabindex="-1">
        <label for="haptic-trigger" id="haptic-label"></label>
    </div>

    <script>
        const cylinder = document.getElementById('cylinder');
        const angleText = document.getElementById('angle-text');
        const statusText = document.getElementById('status-text');
        const stageText = document.getElementById('stage-text');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const gameContainer = document.getElementById('game-container');

        let isInitialized = false;
        let isUnlocked = false;
        let isTouching = false;
        let stages = [0, 0, 0].map(() => Math.floor(Math.random() * 360));
        let currentStageIndex = 0;
        let lastTickAngle = 0;
        let currentAngle = 0;
        let lastAngle = 0;
        let isInSweetSpot = false;
        let lastHeartbeatTime = 0;
        let lastResolutionAngle = 0;
        let audioCtx = null;

        // Scrape Sound Engine
        const scrapeSound = {
            noiseNode: null,
            filterNode: null,
            gainNode: null,
            started: false,

            init(ctx) {
                const bufferSize = 2 * ctx.sampleRate;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                this.noiseNode = ctx.createBufferSource();
                this.noiseNode.buffer = buffer;
                this.noiseNode.loop = true;

                // Highpass to remove "wind/whoosh" lower frequencies
                this.hpFilter = ctx.createBiquadFilter();
                this.hpFilter.type = 'highpass';
                this.hpFilter.frequency.value = 2000;

                // Resonant peak for metallic "ring"
                this.filterNode = ctx.createBiquadFilter();
                this.filterNode.type = 'bandpass';
                this.filterNode.frequency.value = 4000;
                this.filterNode.Q.value = 15; // Sharper resonance

                this.gainNode = ctx.createGain();
                this.gainNode.gain.value = 0;

                this.noiseNode.connect(this.hpFilter);
                this.hpFilter.connect(this.filterNode);
                this.filterNode.connect(this.gainNode);
                this.gainNode.connect(ctx.destination);

                this.noiseNode.start();
                this.started = true;
            },

            update(velocity, proximity) {
                if (!this.started) return;

                // velocity is degree change per frame, proximity is 0 to 1 (1 being closest)
                const baseGain = Math.min(velocity * 0.1, 0.3);
                const proximityEffect = proximity > 0.5 ? (proximity - 0.5) * 2 : 0;

                // Add "grit": faster movements jitter the frequency more
                const jitter = (Math.random() - 0.5) * velocity * 50;

                this.gainNode.gain.setTargetAtTime(baseGain + proximityEffect * 0.1, audioCtx.currentTime, 0.05);

                // Metallic scrape moves from 3kHz to 6kHz based on speed and proximity
                const targetFreq = 3000 + (velocity * 40) + (proximityEffect * 2000) + jitter;
                this.filterNode.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);

                // Higher Q near sweet spot for "ringing" metal feel
                this.filterNode.Q.setTargetAtTime(10 + proximityEffect * 20, audioCtx.currentTime, 0.05);
                this.hpFilter.frequency.setTargetAtTime(1500 + velocity * 20, audioCtx.currentTime, 0.05);
            }
        };

        // Haptic State Machine & Scheduler (Final Universal)
        const hapticInput = document.getElementById('haptic-trigger');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        let pendingHaptic = null;
        let lastPhysicalHapticTime = 0;
        const HAPTIC_INTERVAL = 100; // Minimal safe interval for iOS (ms)

        const triggerHaptic = (type) => {
            if (pendingHaptic === 'SUCCESS' || pendingHaptic === 'FAIL') return;
            pendingHaptic = type;
        };

        const playAudioClick = (freq = 150) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        };

        const performVibration = (type) => {
            if (isIOS && hapticInput && isTouching) {
                // Pre-sharpening audio click (sine based)
                if (type === 'TICK') playAudioClick(150);
                else if (type === 'SNAP') playAudioClick(250);
                else if (type === 'SUCCESS') playAudioClick(100);
                else if (type === 'HEARTBEAT') playAudioClick(80);

                // Physical trigger toggling for iOS Chrome
                hapticInput.checked = !hapticInput.checked;

                if (type === 'SUCCESS') {
                    setTimeout(() => { hapticInput.checked = !hapticInput.checked; }, 120);
                    setTimeout(() => { hapticInput.checked = !hapticInput.checked; }, 240);
                }
            } else if (!isIOS && 'vibrate' in navigator) {
                if (type === 'TICK') navigator.vibrate(5);
                else if (type === 'SNAP') navigator.vibrate(20);
                else if (type === 'SUCCESS') navigator.vibrate([100, 50, 100]);
                else if (type === 'FAIL') navigator.vibrate([30, 30, 30]);
                else if (type === 'HEARTBEAT') navigator.vibrate(10);
            }
        };

        const hapticScheduler = () => {
            const now = Date.now();
            if (pendingHaptic && (now - lastPhysicalHapticTime >= HAPTIC_INTERVAL)) {
                const intent = pendingHaptic;
                pendingHaptic = null;
                lastPhysicalHapticTime = now;
                performVibration(intent);
            }
            requestAnimationFrame(hapticScheduler);
        };

        const init = async () => {
            if (isInitialized) return; // Prevent duplicate init

            // Audio Context must start on gesture
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            scrapeSound.init(audioCtx);

            // Start haptic scheduler on user gesture
            hapticScheduler();

            // iOS Permission Request
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startTracking();
                    } else {
                        alert('센서 권한이 필요합니다.');
                        return;
                    }
                } catch (e) {
                    console.error(e);
                    return;
                }
            } else {
                startTracking();
            }

            overlay.classList.add('hidden');
            isInitialized = true;

            // Initial feedback
            performVibration('SNAP');
        };

        const startTracking = () => {
            window.addEventListener('deviceorientation', handleOrientation);
            requestAnimationFrame(updateLoop);
        };

        const handleOrientation = (event) => {
            if (isUnlocked) return;
            let alpha = event.alpha;
            if (alpha === null) return;
            currentAngle = alpha;
        };

        const updateLoop = () => {
            if (isUnlocked) return;

            // Calculate velocity for sound
            const diff = Math.abs(currentAngle - lastAngle);
            const velocity = Math.min(diff, 360 - diff);
            lastAngle = currentAngle;

            // Apply rotation with translateZ(0) for performance
            cylinder.style.transform = `rotate(${currentAngle}deg) translateZ(0)`;
            angleText.textContent = `${Math.floor(currentAngle)}°`;

            const proximity = checkHapticFeedback(currentAngle);
            scrapeSound.update(velocity, proximity);

            // Heartbeat check (when stationary in sweet spot and touching)
            if (isInSweetSpot && isTouching && velocity < 0.1) {
                const now = Date.now();
                if (now - lastHeartbeatTime > 800) {
                    triggerHaptic('HEARTBEAT');
                    lastHeartbeatTime = now;
                }
            }

            requestAnimationFrame(updateLoop);
        };

        const checkHapticFeedback = (angle) => {
            const sweetSpot = stages[currentStageIndex];
            const diff = Math.abs(angle - sweetSpot);
            const normalizedDiff = Math.min(diff, 360 - diff);
            const proximity = Math.max(0, 1 - (normalizedDiff / 30)); // 0 to 1 within 30 degrees

            // 1. Regular Zone (outside 10 degrees)
            if (normalizedDiff > 10) {
                const tickZone = Math.floor(angle / 10);
                if (tickZone !== lastTickAngle) {
                    triggerHaptic('TICK');
                    lastTickAngle = tickZone;
                    isInSweetSpot = false; // Reset zone monitoring
                }
            }
            // 2. Proximity Tension Zone (within 10 degrees)
            else if (normalizedDiff > 2) {
                // Higher resolution ticks for "tension" texture
                const resZone = Math.floor(angle / 2); // Tick every 2 degrees
                if (resZone !== lastResolutionAngle) {
                    triggerHaptic('TICK');
                    lastResolutionAngle = resZone;
                    isInSweetSpot = false;
                }
            }
            // 3. Sweet Spot Snap (within 2 degrees)
            else {
                // Trigger SNAP once when entering the zone
                if (!isInSweetSpot) {
                    triggerHaptic('SNAP');
                    isInSweetSpot = true;
                }
            }
            return proximity;
        };

        const tryUnlock = () => {
            if (!isInitialized || isUnlocked) return;

            const sweetSpot = stages[currentStageIndex];
            const diff = Math.abs(currentAngle - sweetSpot);
            const normalizedDiff = Math.min(diff, 360 - diff);

            if (normalizedDiff <= 2) {
                if (currentStageIndex < stages.length - 1) {
                    // Advance to next stage
                    currentStageIndex++;
                    stageText.textContent = `${currentStageIndex + 1}/${stages.length}`;
                    triggerHaptic('SNAP');
                    // Flash indicator
                    cylinder.style.transition = 'background 0.2s';
                    cylinder.style.background = 'radial-gradient(circle at 30% 30%, #ffd700, #444)';
                    setTimeout(() => {
                        cylinder.style.background = '';
                        cylinder.style.transition = '';
                    }, 200);
                } else {
                    unlockSuccess();
                }
            } else {
                // Fail feedback
                triggerHaptic('FAIL');
                gameContainer.style.animation = 'none';
                void gameContainer.offsetWidth;
                gameContainer.style.animation = 'shake 0.2s linear';
            }
        };

        const unlockSuccess = () => {
            isUnlocked = true;
            triggerHaptic('SUCCESS');
            document.body.classList.add('unlocked');
            statusText.textContent = 'OPEN';
            statusText.style.color = 'var(--accent-color)';
        };

        const reset = () => {
            if (!isInitialized) return;
            const previouslyUnlocked = isUnlocked;
            // Allow manual reset even if not unlocked
            isUnlocked = false;
            stages = [0, 0, 0].map(() => Math.floor(Math.random() * 360));
            currentStageIndex = 0;
            stageText.textContent = `1/${stages.length}`;
            lastTickAngle = 0;
            lastResolutionAngle = 0;
            isInSweetSpot = false;

            document.body.classList.remove('unlocked');
            statusText.textContent = 'LOCKED';
            statusText.style.color = '#aaa';

            // Restart the logic loop only if it was stopped
            if (previouslyUnlocked) {
                requestAnimationFrame(updateLoop);
            }

            // Feedback
            triggerHaptic('SNAP');
        };

        startBtn.addEventListener('click', init);

        // Touchable surface handlers
        window.addEventListener('pointerdown', (e) => {
            if (e.target === startBtn) return;
            isTouching = true;

            if (isUnlocked) {
                reset();
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (e.target === startBtn) return;

            // Only try unlock on quick tap (not long hold)
            const wasHolding = false; // We could add a timer here, but for now let's use a simpler logic
            // If we were touching and released quickly, we try unlock
            // But actually, the user instruction is "Tap to unlock", so we keep it simple
            if (!isUnlocked) {
                tryUnlock();
            }
            isTouching = false;
        });

        window.addEventListener('pointercancel', () => {
            isTouching = false;
        });

    </script>
</body>

</html>
