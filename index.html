<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interactive Lockpicking</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #ffd700;
            --danger-color: #ff3b30;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Start Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 2rem;
            max-width: 300px;
            line-height: 1.5;
        }

        #start-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: white;
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* Lock Container */
        .game-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-outer {
            position: relative;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 30% 30%, #333, #111);
            border-radius: 50%;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 2px 10px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #222;
        }

        .lock-cylinder {
            position: relative;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 30% 30%, #444, #222);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.1), 0 5px 15px rgba(0, 0, 0, 0.5);
            /* GPU Acceleration */
            will-change: transform;
            transform: translateZ(0);
        }

        .keyhole {
            width: 12px;
            height: 50px;
            background: #000;
            border-radius: 4px;
            position: relative;
        }

        .keyhole::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 50%;
        }

        .indicator {
            position: absolute;
            top: -20px;
            width: 4px;
            height: 20px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            border-radius: 2px;
        }

        /* Success UI */
        #success-msg {
            position: absolute;
            bottom: -100px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #success-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .congrats {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            top: 40px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            display: flex;
            gap: 20px;
        }

        .status-item span {
            color: #aaa;
        }

        /* Animation when unlocked */
        .unlocked .lock-cylinder {
            animation: shake 0.5s ease-in-out;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
        }

        @keyframes shake {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.1) rotate(5deg);
            }

            50% {
                transform: scale(1.05) rotate(-5deg);
            }

            75% {
                transform: scale(1.1) rotate(5deg);
            }
        }

        .hint {
            position: fixed;
            bottom: 40px;
            font-size: 0.9rem;
            color: #444;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>LOCKPICK</h1>
        <p>
            <strong>스마트폰을 책상 위에 내려놓으세요.</strong><br>
            스마트폰을 제자리에서 천천히 회전시켜 정답 각도를 찾으십시오.<br>
            미세한 진동에 집중하세요!
        </p>
        <button id="start-btn">시작</button>
    </div>

    <div class="status-bar">
        <div class="status-item">STATUS: <span id="status-text">LOCKED</span></div>
        <div class="status-item">ANGLE: <span id="angle-text">0°</span></div>
    </div>

    <div class="game-container" id="game-container">
        <div class="lock-outer" id="lock-outer">
            <div class="lock-cylinder" id="cylinder">
                <div class="indicator"></div>
                <div class="keyhole"></div>
            </div>
        </div>
    </div>

    <div id="success-msg">
        <div class="congrats">해제 성공!</div>
        <button id="reset-btn"
            style="background:none; border: 1px solid #444; color: #888; padding: 5px 15px; border-radius: 20px; margin-top: 10px;">다시
            시작</button>
    </div>

    <div class="hint">TAP SCREEN TO UNLOCK WHEN NEAR</div>

    <!-- Hidden haptic trigger for iOS 17.4+ -->
    <div
        style="position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; overflow: hidden; pointer-events: none; z-index: -1;">
        <input type="checkbox" id="haptic-trigger" switch>
        <label for="haptic-trigger" id="haptic-label"></label>
    </div>

    <script>
        const cylinder = document.getElementById('cylinder');
        const angleText = document.getElementById('angle-text');
        const statusText = document.getElementById('status-text');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const gameContainer = document.getElementById('game-container');
        const successMsg = document.getElementById('success-msg');
        const resetBtn = document.getElementById('reset-btn');

        let isInitialized = false;
        let isUnlocked = false;
        let sweetSpot = Math.floor(Math.random() * 360);
        let lastTickAngle = 0;
        let currentAngle = 0;
        let lastVibrationTime = 0;

        // Haptic State Machine & Scheduler
        const hapticTrigger = document.getElementById('haptic-label');
        const hapticInput = document.getElementById('haptic-trigger');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        let pendingHaptic = null; // 'TICK', 'SNAP', 'SUCCESS', 'FAIL'
        let lastPhysicalHapticTime = 0;
        const HAPTIC_INTERVAL = 60; // Safe interval for iOS (ms)

        const triggerHaptic = (type) => {
            // Priority: SUCCESS/FAIL > SNAP > TICK
            if (pendingHaptic === 'SUCCESS' || pendingHaptic === 'FAIL') return;
            pendingHaptic = type;
        };

        const hapticScheduler = async () => {
            const now = Date.now();
            if (pendingHaptic && (now - lastPhysicalHapticTime >= HAPTIC_INTERVAL)) {
                const intent = pendingHaptic;
                pendingHaptic = null; // Clear intent
                lastPhysicalHapticTime = now;

                if (isIOS && hapticTrigger && hapticInput) {
                    // Physical trigger
                    hapticInput.checked = !hapticInput.checked;
                    hapticTrigger.click();

                    // For long patterns, we still need a delay
                    if (intent === 'SUCCESS') {
                        setTimeout(() => { hapticTrigger.click(); }, 150);
                        setTimeout(() => { hapticTrigger.click(); }, 300);
                    } else if (intent === 'FAIL') {
                        setTimeout(() => { hapticTrigger.click(); }, 100);
                    }
                } else if ('vibrate' in navigator) {
                    if (intent === 'TICK') navigator.vibrate(5);
                    else if (intent === 'SNAP') navigator.vibrate(20);
                    else if (intent === 'SUCCESS') navigator.vibrate(300);
                    else if (intent === 'FAIL') navigator.vibrate([50, 50, 50]);
                }
            }
            requestAnimationFrame(hapticScheduler);
        };

        // Start scheduler immediately
        hapticScheduler();

        const init = async () => {
            // iOS Permission Request
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startTracking();
                    } else {
                        alert('센서 권한이 필요합니다.');
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Non-iOS or old iOS
                startTracking();
            }

            // Audio Context activation (optional, for haptic feel)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            overlay.classList.add('hidden');
            isInitialized = true;
            triggerHaptic('SNAP'); // Initial feedback
        };

        const startTracking = () => {
            window.addEventListener('deviceorientation', handleOrientation);
            requestAnimationFrame(updateLoop);
        };

        const handleOrientation = (event) => {
            if (isUnlocked) return;
            let alpha = event.alpha;
            if (alpha === null) return;
            currentAngle = alpha;
        };

        const updateLoop = () => {
            if (isUnlocked) return;

            // Apply rotation with translateZ(0) for performance
            cylinder.style.transform = `rotate(${currentAngle}deg) translateZ(0)`;
            angleText.textContent = `${Math.floor(currentAngle)}°`;

            checkHapticFeedback(currentAngle);
            requestAnimationFrame(updateLoop);
        };

        const checkHapticFeedback = (angle) => {
            const diff = Math.abs(angle - sweetSpot);
            const normalizedDiff = Math.min(diff, 360 - diff);

            // 1. Regular tick (Every 10 degrees)
            const currentTickZone = Math.floor(angle / 10);
            if (currentTickZone !== lastTickAngle) {
                triggerHaptic('TICK');
                lastTickAngle = currentTickZone;
            }

            // 2. Proximity Tension
            if (normalizedDiff <= 10 && normalizedDiff > 2) {
                const now = Date.now();
                const interval = 120 + (normalizedDiff * 40);
                if (now - lastVibrationTime > interval) {
                    triggerHaptic('TICK');
                    lastVibrationTime = now;
                }
            }

            // 3. Sweet Spot Snap
            if (normalizedDiff <= 2) {
                const now = Date.now();
                if (now - lastVibrationTime > 200) {
                    triggerHaptic('SNAP');
                    lastVibrationTime = now;
                }
            }
        };

        const tryUnlock = () => {
            if (!isInitialized || isUnlocked) return;

            const diff = Math.abs(currentAngle - sweetSpot);
            const normalizedDiff = Math.min(diff, 360 - diff);

            if (normalizedDiff <= 2) {
                unlockSuccess();
            } else {
                // Fail feedback
                triggerHaptic('FAIL');
                gameContainer.style.animation = 'none';
                void gameContainer.offsetWidth;
                gameContainer.style.animation = 'shake 0.2s linear';
            }
        };

        const unlockSuccess = () => {
            isUnlocked = true;
            triggerHaptic('SUCCESS');
            document.body.classList.add('unlocked');
            statusText.textContent = 'OPEN';
            statusText.style.color = 'var(--accent-color)';
            successMsg.classList.add('show');
        };

        const reset = () => {
            isUnlocked = false;
            sweetSpot = Math.floor(Math.random() * 360);
            document.body.classList.remove('unlocked');
            statusText.textContent = 'LOCKED';
            statusText.style.color = '#aaa';
            successMsg.classList.remove('show');
            triggerHaptic('SNAP');
        };

        startBtn.addEventListener('click', init);
        resetBtn.addEventListener('click', reset);

        // Touchable surface
        window.addEventListener('pointerdown', (e) => {
            if (e.target !== startBtn && e.target !== resetBtn) {
                tryUnlock();
            }
        });

    </script>
</body>

</html>
